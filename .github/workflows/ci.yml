name: DoubtNet CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f server/requirements.txt ]; then pip install -r server/requirements.txt; fi

    - name: Check syntax (py_compile)
      run: |
        python -m py_compile server/*.py

    - name: Run Integration Tests
      run: |
        # Generate temporary points, schedule, and doubts config files for testing
        mkdir -p server/data/rooms
        python -c "import sys; sys.path.insert(0, './server'); import py_compile; print('Syntax and dependencies check passed!')"
